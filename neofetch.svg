  <!-- ==================== INFO PANEL ==================== -->
  <g>
    <!-- Header -->
    <text class="header i0" x="440" y="60">
      <tspan class="val-cyan">pablo</tspan><tspan class="dots">@</tspan><tspan class="val-purple">morales</tspan>
