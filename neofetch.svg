<svg xmlns="http://www.w3.org/2000/svg" width="850" height="620" viewBox="0 0 850 620">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&amp;display=swap');

      .bg { fill: #0d1117; }
      .border { fill: none; stroke: #393E46; stroke-width: 1; rx: 12; }
      .face { fill: #DFD0B8; font-family: 'JetBrains Mono', 'Courier New', monospace; font-size: 11.5px; }
      .header { fill: #DFD0B8; font-family: 'JetBrains Mono', monospace; font-size: 12px; font-weight: 700; }
      .separator { fill: #393E46; font-family: 'JetBrains Mono', monospace; font-size: 12px; }
      .label { fill: #DFD0B8; font-family: 'JetBrains Mono', monospace; font-size: 12px; font-weight: 700; }
      .dots { fill: #393E46; font-family: 'JetBrains Mono', monospace; font-size: 12px; }
      .val-cyan { fill: #56D4DD; font-family: 'JetBrains Mono', monospace; font-size: 12px; }
      .val-green { fill: #9FEF00; font-family: 'JetBrains Mono', monospace; font-size: 12px; }
      .val-yellow { fill: #E8D44D; font-family: 'JetBrains Mono', monospace; font-size: 12px; }
      .val-orange { fill: #FF9900; font-family: 'JetBrains Mono', monospace; font-size: 12px; }
      .val-purple { fill: #BD93F9; font-family: 'JetBrains Mono', monospace; font-size: 12px; }
      .val-pink { fill: #FF79C6; font-family: 'JetBrains Mono', monospace; font-size: 12px; }
      .val-red { fill: #FF5555; font-family: 'JetBrains Mono', monospace; font-size: 12px; }
      .val-blue { fill: #6272A4; font-family: 'JetBrains Mono', monospace; font-size: 12px; }
      .palette1 { fill: #222831; }
      .palette2 { fill: #393E46; }
      .palette3 { fill: #948979; }
      .palette4 { fill: #DFD0B8; }
      .palette5 { fill: #56D4DD; }
      .palette6 { fill: #9FEF00; }
      .palette7 { fill: #FF9900; }
      .palette8 { fill: #BD93F9; }

      @keyframes blink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0; }
      }
      .cursor { animation: blink 1s infinite; fill: #DFD0B8; }

      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-5px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .line0 { animation: fadeIn 0.3s ease 0.1s both; }
      .line1 { animation: fadeIn 0.3s ease 0.2s both; }
      .line2 { animation: fadeIn 0.3s ease 0.3s both; }
      .line3 { animation: fadeIn 0.3s ease 0.4s both; }
      .line4 { animation: fadeIn 0.3s ease 0.5s both; }
      .line5 { animation: fadeIn 0.3s ease 0.6s both; }
      .line6 { animation: fadeIn 0.3s ease 0.7s both; }
      .line7 { animation: fadeIn 0.3s ease 0.8s both; }
      .line8 { animation: fadeIn 0.3s ease 0.9s both; }
      .line9 { animation: fadeIn 0.3s ease 1.0s both; }
      .line10 { animation: fadeIn 0.3s ease 1.1s both; }
      .line11 { animation: fadeIn 0.3s ease 1.2s both; }
      .line12 { animation: fadeIn 0.3s ease 1.3s both; }
      .line13 { animation: fadeIn 0.3s ease 1.4s both; }
      .line14 { animation: fadeIn 0.3s ease 1.5s both; }

      @keyframes glow {
        0%, 100% { filter: drop-shadow(0 0 2px #DFD0B800); }
        50% { filter: drop-shadow(0 0 6px #DFD0B844); }
      }
      .glow { animation: glow 3s ease-in-out infinite; }
    </style>
  </defs>

  <!-- Background -->
  <rect class="bg" width="850" height="620" rx="12" />
  <rect class="border" x="0.5" y="0.5" width="849" height="619" rx="12" />

  <!-- Terminal dots -->
  <circle cx="24" cy="20" r="6" fill="#FF5F56" />
  <circle cx="44" cy="20" r="6" fill="#FFBD2E" />
  <circle cx="64" cy="20" r="6" fill="#27C93F" />
  <text x="360" y="24" fill="#948979" font-family="JetBrains Mono, monospace" font-size="11" text-anchor="middle">pablo@morales: ~</text>

  <!-- ASCII Face - refined portrait with short hair and glasses -->
  <g class="glow">
    <text class="face line0"  x="28" y="65">        .;=+*#@@@@@@#*+=;.</text>
    <text class="face line0"  x="28" y="80">      ,#@@@@@@@@@@@@@@@@@@#,</text>
    <text class="face line0"  x="28" y="95">    .#@@@@@@@@@@@@@@@@@@@@@@#.</text>
    <text class="face line1"  x="28" y="110">   ;@@@@@@@@@@@@@@@@@@@@@@@@@@;</text>
    <text class="face line1"  x="28" y="125">  .@@@@@@@@@@@@@@@@@@@@@@@@@@@@.</text>
    <text class="face line2"  x="28" y="140">  #@@@@@@@%*+=------=+*%@@@@@@@#</text>
    <text class="face line2"  x="28" y="155">  @@@@#;.                .;#@@@@</text>
    <text class="face line3"  x="28" y="170">  @@@+    ,=*%%##%%*=,    +@@@</text>
    <text class="face line3"  x="28" y="185">  @@;   =%@@@@@@@@@@@@%=   ;@@</text>
    <text class="face line4"  x="28" y="200">  @+  .#@@%*;, .. ,;*%@@#.  +@</text>
    <text class="face line4"  x="28" y="215">  @, .==[@@]=..  ..=[@@]==. ,@</text>
    <text class="face line5"  x="28" y="230">  @;   #@@@@#;    ;#@@@@#   ;@</text>
    <text class="face line5"  x="28" y="245">  @@,   '*%#;  ,,  ;#%*'   ,@@</text>
    <text class="face line6"  x="28" y="260">  @@@;    ..  ;@@@@;  ..    ;@@@</text>
    <text class="face line6"  x="28" y="275">  @@@@*,     ,@@@@@@,     ,*@@@@</text>
    <text class="face line7"  x="28" y="290">  @@@@@%=,    '=##='    ,=%@@@@@</text>
    <text class="face line7"  x="28" y="305">  @@@@@@@%+;,........,;+%@@@@@@@</text>
    <text class="face line8"  x="28" y="320">  @@@@@@@@@@%#******#%@@@@@@@@@@</text>
    <text class="face line8"  x="28" y="335">  @@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@</text>
    <text class="face line9"  x="28" y="350">  @@@@@@@@@@@@@@@@@@@@@@@@@@@@@@</text>
    <text class="face line9"  x="28" y="365">   #@@@@@@@@@@@@@@@@@@@@@@@@@@#</text>
    <text class="face line10" x="28" y="380">    '%@@@@@@@@@@@@@@@@@@@@@@%'</text>
    <text class="face line10" x="28" y="395">      ,*#@@@@@@@@@@@@@@#*,</text>
    <text class="face line11" x="28" y="410">         .;=+**##**+=;.</text>
  </g>

  <!-- Info panel - right side -->
  <g>
    <!-- Header -->
    <text class="header line0" x="430" y="68"><tspan class="val-cyan">pablo</tspan><tspan class="dots">@</tspan><tspan class="val-purple">morales</tspan></text>
    <text class="separator line0" x="430" y="83">────────────────────────────────────</text>

    <!-- OS -->
    <text class="line1" x="430" y="108">
      <tspan class="label">OS</tspan><tspan class="dots"> ................... </tspan><tspan class="val-cyan">Guatemala, Cloud-native</tspan>
    </text>

    <!-- Uptime -->
    <text class="line2" x="430" y="133">
      <tspan class="label">Uptime</tspan><tspan class="dots"> .............. </tspan><tspan class="val-green">4+ years engineering</tspan>
    </text>

    <!-- Host -->
    <text class="line3" x="430" y="158">
      <tspan class="label">Host</tspan><tspan class="dots"> ................ </tspan><tspan class="val-yellow">Olive Tech GT</tspan>
    </text>

    <!-- Kernel -->
    <text class="line4" x="430" y="183">
      <tspan class="label">Kernel</tspan><tspan class="dots"> .............. </tspan><tspan class="val-orange">Systems Engineering</tspan>
    </text>

    <!-- IDE -->
    <text class="line5" x="430" y="208">
      <tspan class="label">IDE</tspan><tspan class="dots"> ................. </tspan><tspan class="val-purple">VSCode, IntelliJ IDEA</tspan>
    </text>

    <!-- Separator -->
    <text class="separator line5" x="430" y="233">────────────────────────────────────</text>

    <!-- Languages.Code -->
    <text class="line6" x="430" y="258">
      <tspan class="label">Languages.Code</tspan><tspan class="dots"> ...... </tspan><tspan class="val-cyan">TypeScript, JavaScript,</tspan>
    </text>
    <text class="line6" x="430" y="273">
      <tspan class="dots">                      </tspan><tspan class="val-cyan">Python, Java, C++, SQL</tspan>
    </text>

    <!-- Languages.Human -->
    <text class="line7" x="430" y="298">
      <tspan class="label">Languages.Human</tspan><tspan class="dots"> ..... </tspan><tspan class="val-green">English, Spanish</tspan>
    </text>

    <!-- Frameworks -->
    <text class="line8" x="430" y="323">
      <tspan class="label">Frameworks</tspan><tspan class="dots"> .......... </tspan><tspan class="val-yellow">React, Next.js, Angular,</tspan>
    </text>
    <text class="line8" x="430" y="338">
      <tspan class="dots">                      </tspan><tspan class="val-yellow">Node.js, Express</tspan>
    </text>

    <!-- Cloud -->
    <text class="line9" x="430" y="363">
      <tspan class="label">Cloud</tspan><tspan class="dots"> ............... </tspan><tspan class="val-orange">GCP, Docker, CI/CD</tspan>
    </text>

    <!-- AI/ML -->
    <text class="line10" x="430" y="388">
      <tspan class="label">AI/ML</tspan><tspan class="dots"> ............... </tspan><tspan class="val-purple">TensorFlow, Python</tspan>
    </text>

    <!-- Security -->
    <text class="line11" x="430" y="413">
      <tspan class="label">Security</tspan><tspan class="dots"> ............ </tspan><tspan class="val-red">Threat Modeling,</tspan>
    </text>
    <text class="line11" x="430" y="428">
      <tspan class="dots">                      </tspan><tspan class="val-red">Vulnerability Assessment,</tspan>
    </text>
    <text class="line11" x="430" y="443">
      <tspan class="dots">                      </tspan><tspan class="val-red">Secure Architecture</tspan>
    </text>

    <!-- Separator -->
    <text class="separator line12" x="430" y="468">────────────────────────────────────</text>

    <!-- Currently -->
    <text class="line13" x="430" y="493">
      <tspan class="label">Currently</tspan><tspan class="dots"> ........... </tspan><tspan class="val-pink">Master's in Cybersecurity</tspan>
    </text>

    <!-- Focus -->
    <text class="line13" x="430" y="518">
      <tspan class="label">Focus</tspan><tspan class="dots"> ............... </tspan><tspan class="val-cyan">API Architecture +</tspan>
    </text>
    <text class="line13" x="430" y="533">
      <tspan class="dots">                      </tspan><tspan class="val-cyan">Cloud Integrations</tspan>
    </text>

    <!-- Portfolio -->
    <text class="line14" x="430" y="558">
      <tspan class="label">Portfolio</tspan><tspan class="dots"> ........... </tspan><tspan class="val-green">pmorales.vercel.app</tspan>
    </text>
  </g>

  <!-- Color palette blocks -->
  <g class="line14">
    <rect class="palette1" x="430" y="575" width="30" height="15" rx="2" />
    <rect class="palette2" x="465" y="575" width="30" height="15" rx="2" />
    <rect class="palette3" x="500" y="575" width="30" height="15" rx="2" />
    <rect class="palette4" x="535" y="575" width="30" height="15" rx="2" />
    <rect class="palette5" x="570" y="575" width="30" height="15" rx="2" />
    <rect class="palette6" x="605" y="575" width="30" height="15" rx="2" />
    <rect class="palette7" x="640" y="575" width="30" height="15" rx="2" />
    <rect class="palette8" x="675" y="575" width="30" height="15" rx="2" />
  </g>

  <!-- Blinking cursor -->
  <rect class="cursor" x="628" y="548" width="8" height="14" rx="1" />
</svg>
