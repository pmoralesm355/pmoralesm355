<svg xmlns="http://www.w3.org/2000/svg" width="820" height="520" viewBox="0 0 820 520">
  <defs>
    <style>
      text { font-family: 'Courier New', Courier, 'Liberation Mono', 'Lucida Console', monospace; }

      .bg { fill: #0d1117; }
      .border { fill: none; stroke: #393E46; stroke-width: 1.5; }
      .label { fill: #DFD0B8; font-size: 14px; font-weight: bold; }
      .dots { fill: #4A5568; font-size: 14px; }
      .sep { fill: #393E46; font-size: 14px; }
      .v-cyan { fill: #56D4DD; font-size: 14px; }
      .v-green { fill: #9FEF00; font-size: 14px; }
      .v-yellow { fill: #E8D44D; font-size: 14px; }
      .v-orange { fill: #FF9900; font-size: 14px; }
      .v-purple { fill: #BD93F9; font-size: 14px; }
      .v-pink { fill: #FF79C6; font-size: 14px; }
      .v-red { fill: #FF5555; font-size: 14px; }
      .title { fill: #948979; font-size: 13px; }

      @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
      .cursor { animation: blink 1s step-end infinite; fill: #DFD0B8; }

      @keyframes slideR { from{opacity:0;transform:translateX(12px)} to{opacity:1;transform:translateX(0)} }
      @keyframes scaleIn { from{opacity:0;transform:scaleX(0)} to{opacity:1;transform:scaleX(1)} }

      .i0{animation:slideR .4s ease .1s both} .i1{animation:slideR .4s ease .2s both}
      .i2{animation:slideR .4s ease .3s both} .i3{animation:slideR .4s ease .4s both}
      .i4{animation:slideR .4s ease .5s both} .i5{animation:slideR .4s ease .6s both}
      .i6{animation:slideR .4s ease .7s both} .i7{animation:slideR .4s ease .8s both}
      .i8{animation:slideR .4s ease .9s both} .i9{animation:slideR .4s ease 1.0s both}
      .i10{animation:slideR .4s ease 1.1s both} .i11{animation:slideR .4s ease 1.2s both}
      .i12{animation:slideR .4s ease 1.3s both} .i13{animation:slideR .4s ease 1.4s both}

      .c0{animation:scaleIn .25s ease 1.4s both} .c1{animation:scaleIn .25s ease 1.45s both}
      .c2{animation:scaleIn .25s ease 1.5s both} .c3{animation:scaleIn .25s ease 1.55s both}
      .c4{animation:scaleIn .25s ease 1.6s both} .c5{animation:scaleIn .25s ease 1.65s both}
      .c6{animation:scaleIn .25s ease 1.7s both} .c7{animation:scaleIn .25s ease 1.75s both}
    </style>
  </defs>

  <rect class="bg" width="820" height="520" rx="12"/>
  <rect class="border" x=".5" y=".5" width="819" height="519" rx="12"/>

  <!-- Terminal buttons -->
  <circle cx="26" cy="22" r="7" fill="#FF5F56"/>
  <circle cx="48" cy="22" r="7" fill="#FFBD2E"/>
  <circle cx="70" cy="22" r="7" fill="#27C93F"/>
  <text class="title" x="410" y="26" text-anchor="middle">pablo@morales: ~ neofetch</text>

  <!-- ========== INFO PANEL — centered ========== -->

  <text class="i0" x="40" y="65"><tspan class="v-cyan">pablo</tspan><tspan class="dots">@</tspan><tspan class="v-purple">morales</tspan></text>
  <text class="sep i0" x="40" y="82">────────────────────────────────────────────────────────────────────────────</text>

  <text class="i1" x="40" y="112"><tspan class="label">OS</tspan><tspan class="dots"> ......................... </tspan><tspan class="v-cyan">Guatemala, Cloud-native</tspan></text>
  <text class="i2" x="40" y="140"><tspan class="label">Uptime</tspan><tspan class="dots"> ..................... </tspan><tspan class="v-green">4+ years engineering</tspan></text>
  <text class="i3" x="40" y="168"><tspan class="label">Host</tspan><tspan class="dots"> ....................... </tspan><tspan class="v-yellow">Olive Tech GT</tspan></text>
  <text class="i4" x="40" y="196"><tspan class="label">Kernel</tspan><tspan class="dots"> ..................... </tspan><tspan class="v-orange">Systems Engineering</tspan></text>
  <text class="i5" x="40" y="224"><tspan class="label">IDE</tspan><tspan class="dots"> ........................ </tspan><tspan class="v-purple">VSCode, IntelliJ IDEA</tspan></text>

  <text class="sep i5" x="40" y="248">────────────────────────────────────────────────────────────────────────────</text>

  <text class="i6" x="40" y="276"><tspan class="label">Languages.Code</tspan><tspan class="dots"> ........... </tspan><tspan class="v-cyan">TypeScript, JavaScript, Python, Java, C++, SQL</tspan></text>
  <text class="i7" x="40" y="304"><tspan class="label">Languages.Human</tspan><tspan class="dots"> .......... </tspan><tspan class="v-green">English, Spanish</tspan></text>
  <text class="i8" x="40" y="332"><tspan class="label">Frameworks</tspan><tspan class="dots"> ............... </tspan><tspan class="v-yellow">React, Next.js, Angular, Node.js, Express</tspan></text>
  <text class="i9" x="40" y="360"><tspan class="label">Cloud</tspan><tspan class="dots"> .................... </tspan><tspan class="v-orange">GCP, Docker, CI/CD</tspan></text>
  <text class="i10" x="40" y="388"><tspan class="label">AI/ML</tspan><tspan class="dots"> .................... </tspan><tspan class="v-purple">TensorFlow, Python</tspan></text>
  <text class="i11" x="40" y="416"><tspan class="label">Security</tspan><tspan class="dots"> ................. </tspan><tspan class="v-red">Threat Modeling, Vuln Assessment, Secure Arch</tspan></text>

  <text class="sep i12" x="40" y="440">────────────────────────────────────────────────────────────────────────────</text>

  <text class="i12" x="40" y="468"><tspan class="label">Currently</tspan><tspan class="dots"> ................ </tspan><tspan class="v-pink">Master's in Cybersecurity</tspan></text>
  <text class="i13" x="40" y="496"><tspan class="label">Focus</tspan><tspan class="dots"> .................... </tspan><tspan class="v-cyan">API Architecture + Cloud Integrations</tspan></text>

  <!-- Color palette -->
  <rect class="c0" x="40"  y="496" width="34" height="3" rx="1" fill="#222831"/>
  <rect class="c1" x="79"  y="496" width="34" height="3" rx="1" fill="#393E46"/>
  <rect class="c2" x="118" y="496" width="34" height="3" rx="1" fill="#948979"/>
  <rect class="c3" x="157" y="496" width="34" height="3" rx="1" fill="#DFD0B8"/>
  <rect class="c4" x="196" y="496" width="34" height="3" rx="1" fill="#56D4DD"/>
  <rect class="c5" x="235" y="496" width="34" height="3" rx="1" fill="#9FEF00"/>
  <rect class="c6" x="274" y="496" width="34" height="3" rx="1" fill="#FF9900"/>
  <rect class="c7" x="313" y="496" width="34" height="3" rx="1" fill="#BD93F9"/>

  <!-- Blinking cursor -->
  <rect class="cursor" x="630" y="486" width="9" height="14" rx="1"/>
</svg>
