<svg xmlns="http://www.w3.org/2000/svg" width="860" height="590" viewBox="0 0 860 590">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&amp;display=swap');

      .bg { fill: #0d1117; }
      .border { fill: none; stroke: #393E46; stroke-width: 1.5; }
      .face { fill: #DFD0B8; font-family: 'JetBrains Mono', 'Courier New', monospace; font-size: 10.2px; }
      .header { fill: #DFD0B8; font-family: 'JetBrains Mono', monospace; font-size: 12px; font-weight: 700; }
      .separator { fill: #393E46; font-family: 'JetBrains Mono', monospace; font-size: 12px; }
      .label { fill: #DFD0B8; font-family: 'JetBrains Mono', monospace; font-size: 11.5px; font-weight: 700; }
      .dots { fill: #393E46; font-family: 'JetBrains Mono', monospace; font-size: 11.5px; }
      .val-cyan { fill: #56D4DD; font-family: 'JetBrains Mono', monospace; font-size: 11.5px; }
      .val-green { fill: #9FEF00; font-family: 'JetBrains Mono', monospace; font-size: 11.5px; }
      .val-yellow { fill: #E8D44D; font-family: 'JetBrains Mono', monospace; font-size: 11.5px; }
      .val-orange { fill: #FF9900; font-family: 'JetBrains Mono', monospace; font-size: 11.5px; }
      .val-purple { fill: #BD93F9; font-family: 'JetBrains Mono', monospace; font-size: 11.5px; }
      .val-pink { fill: #FF79C6; font-family: 'JetBrains Mono', monospace; font-size: 11.5px; }
      .val-red { fill: #FF5555; font-family: 'JetBrains Mono', monospace; font-size: 11.5px; }
      .palette1 { fill: #222831; }
      .palette2 { fill: #393E46; }
      .palette3 { fill: #948979; }
      .palette4 { fill: #DFD0B8; }
      .palette5 { fill: #56D4DD; }
      .palette6 { fill: #9FEF00; }
      .palette7 { fill: #FF9900; }
      .palette8 { fill: #BD93F9; }

      @keyframes blink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0; }
      }
      .cursor { animation: blink 1s step-end infinite; fill: #DFD0B8; }

      @keyframes fadeSlide {
        from { opacity: 0; transform: translateX(-8px); }
        to { opacity: 1; transform: translateX(0); }
      }
      .r0  { animation: fadeSlide 0.4s ease 0.1s both; }
      .r1  { animation: fadeSlide 0.4s ease 0.15s both; }
      .r2  { animation: fadeSlide 0.4s ease 0.2s both; }
      .r3  { animation: fadeSlide 0.4s ease 0.25s both; }
      .r4  { animation: fadeSlide 0.4s ease 0.3s both; }
      .r5  { animation: fadeSlide 0.4s ease 0.35s both; }
      .r6  { animation: fadeSlide 0.4s ease 0.4s both; }
      .r7  { animation: fadeSlide 0.4s ease 0.45s both; }
      .r8  { animation: fadeSlide 0.4s ease 0.5s both; }
      .r9  { animation: fadeSlide 0.4s ease 0.55s both; }
      .r10 { animation: fadeSlide 0.4s ease 0.6s both; }
      .r11 { animation: fadeSlide 0.4s ease 0.65s both; }
      .r12 { animation: fadeSlide 0.4s ease 0.7s both; }
      .r13 { animation: fadeSlide 0.4s ease 0.75s both; }
      .r14 { animation: fadeSlide 0.4s ease 0.8s both; }
      .r15 { animation: fadeSlide 0.4s ease 0.85s both; }
      .r16 { animation: fadeSlide 0.4s ease 0.9s both; }
      .r17 { animation: fadeSlide 0.4s ease 0.95s both; }
      .r18 { animation: fadeSlide 0.4s ease 1.0s both; }
      .r19 { animation: fadeSlide 0.4s ease 1.05s both; }
      .r20 { animation: fadeSlide 0.4s ease 1.1s both; }
      .r21 { animation: fadeSlide 0.4s ease 1.15s both; }
      .r22 { animation: fadeSlide 0.4s ease 1.2s both; }
      .r23 { animation: fadeSlide 0.4s ease 1.25s both; }
      .r24 { animation: fadeSlide 0.4s ease 1.3s both; }

      @keyframes infoSlide {
        from { opacity: 0; transform: translateX(10px); }
        to { opacity: 1; transform: translateX(0); }
      }
      .i0  { animation: infoSlide 0.4s ease 0.3s both; }
      .i1  { animation: infoSlide 0.4s ease 0.4s both; }
      .i2  { animation: infoSlide 0.4s ease 0.5s both; }
      .i3  { animation: infoSlide 0.4s ease 0.6s both; }
      .i4  { animation: infoSlide 0.4s ease 0.7s both; }
      .i5  { animation: infoSlide 0.4s ease 0.8s both; }
      .i6  { animation: infoSlide 0.4s ease 0.9s both; }
      .i7  { animation: infoSlide 0.4s ease 1.0s both; }
      .i8  { animation: infoSlide 0.4s ease 1.1s both; }
      .i9  { animation: infoSlide 0.4s ease 1.2s both; }
      .i10 { animation: infoSlide 0.4s ease 1.3s both; }
      .i11 { animation: infoSlide 0.4s ease 1.4s both; }
      .i12 { animation: infoSlide 0.4s ease 1.5s both; }
      .i13 { animation: infoSlide 0.4s ease 1.6s both; }

      @keyframes glow {
        0%, 100% { filter: drop-shadow(0 0 1px #DFD0B800); }
        50% { filter: drop-shadow(0 0 4px #DFD0B833); }
      }
      .glow { animation: glow 4s ease-in-out infinite; }

      @keyframes paletteIn {
        from { opacity: 0; transform: scaleX(0); }
        to { opacity: 1; transform: scaleX(1); }
      }
      .p0 { animation: paletteIn 0.3s ease 1.6s both; }
      .p1 { animation: paletteIn 0.3s ease 1.65s both; }
      .p2 { animation: paletteIn 0.3s ease 1.7s both; }
      .p3 { animation: paletteIn 0.3s ease 1.75s both; }
      .p4 { animation: paletteIn 0.3s ease 1.8s both; }
      .p5 { animation: paletteIn 0.3s ease 1.85s both; }
      .p6 { animation: paletteIn 0.3s ease 1.9s both; }
      .p7 { animation: paletteIn 0.3s ease 1.95s both; }
    </style>
  </defs>

  <!-- Background -->
  <rect class="bg" width="860" height="590" rx="12" />
  <rect class="border" x="0.5" y="0.5" width="859" height="589" rx="12" />

  <!-- Terminal window dots -->
