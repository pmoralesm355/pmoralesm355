  <!-- Color palette blocks (animated) -->
  <rect class="palette1 p0" x="440" y="555" width="32" height="14" rx="2" />
  <rect class="palette2 p1" x="477" y="555" width="32" height="14" rx="2" />
  <rect class="palette3 p2" x="514" y="555" width="32" height="14" rx="2" />
  <rect class="palette4 p3" x="551" y="555" width="32" height="14" rx="2" />
