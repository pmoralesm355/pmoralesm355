<svg xmlns="http://www.w3.org/2000/svg" width="860" height="570" viewBox="0 0 860 570">
  <defs>
    <style>
      /* NO @import — GitHub strips external fonts. Using system monospace only. */
      text { font-family: 'Courier New', Courier, 'Liberation Mono', 'Lucida Console', monospace; }

      .bg { fill: #0d1117; }
      .border { fill: none; stroke: #393E46; stroke-width: 1.5; }
      .face { fill: #DFD0B8; font-size: 11px; white-space: pre; }
      .label { fill: #DFD0B8; font-size: 12px; font-weight: bold; }
      .dots { fill: #4A5568; font-size: 12px; }
      .sep { fill: #393E46; font-size: 12px; }
      .v-cyan { fill: #56D4DD; font-size: 12px; }
      .v-green { fill: #9FEF00; font-size: 12px; }
      .v-yellow { fill: #E8D44D; font-size: 12px; }
      .v-orange { fill: #FF9900; font-size: 12px; }
      .v-purple { fill: #BD93F9; font-size: 12px; }
      .v-pink { fill: #FF79C6; font-size: 12px; }
      .v-red { fill: #FF5555; font-size: 12px; }
      .title { fill: #948979; font-size: 11px; }

      @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
      .cursor { animation: blink 1s step-end infinite; fill: #DFD0B8; }

      @keyframes slideL { from{opacity:0;transform:translateX(-12px)} to{opacity:1;transform:translateX(0)} }
      @keyframes slideR { from{opacity:0;transform:translateX(12px)} to{opacity:1;transform:translateX(0)} }
      @keyframes scaleIn { from{opacity:0;transform:scaleX(0)} to{opacity:1;transform:scaleX(1)} }

      .f0{animation:slideL .4s ease .05s both} .f1{animation:slideL .4s ease .08s both}
      .f2{animation:slideL .4s ease .11s both} .f3{animation:slideL .4s ease .14s both}
      .f4{animation:slideL .4s ease .17s both} .f5{animation:slideL .4s ease .20s both}
      .f6{animation:slideL .4s ease .23s both} .f7{animation:slideL .4s ease .26s both}
      .f8{animation:slideL .4s ease .29s both} .f9{animation:slideL .4s ease .32s both}
      .f10{animation:slideL .4s ease .35s both} .f11{animation:slideL .4s ease .38s both}
      .f12{animation:slideL .4s ease .41s both} .f13{animation:slideL .4s ease .44s both}
      .f14{animation:slideL .4s ease .47s both} .f15{animation:slideL .4s ease .50s both}
      .f16{animation:slideL .4s ease .53s both} .f17{animation:slideL .4s ease .56s both}
      .f18{animation:slideL .4s ease .59s both} .f19{animation:slideL .4s ease .62s both}
      .f20{animation:slideL .4s ease .65s both} .f21{animation:slideL .4s ease .68s both}
      .f22{animation:slideL .4s ease .71s both} .f23{animation:slideL .4s ease .74s both}
      .f24{animation:slideL .4s ease .77s both}

      .i0{animation:slideR .4s ease .2s both} .i1{animation:slideR .4s ease .3s both}
      .i2{animation:slideR .4s ease .4s both} .i3{animation:slideR .4s ease .5s both}
      .i4{animation:slideR .4s ease .6s both} .i5{animation:slideR .4s ease .7s both}
      .i6{animation:slideR .4s ease .8s both} .i7{animation:slideR .4s ease .9s both}
      .i8{animation:slideR .4s ease 1.0s both} .i9{animation:slideR .4s ease 1.1s both}
      .i10{animation:slideR .4s ease 1.2s both} .i11{animation:slideR .4s ease 1.3s both}
      .i12{animation:slideR .4s ease 1.4s both} .i13{animation:slideR .4s ease 1.5s both}

      .c0{animation:scaleIn .25s ease 1.5s both} .c1{animation:scaleIn .25s ease 1.55s both}
      .c2{animation:scaleIn .25s ease 1.6s both} .c3{animation:scaleIn .25s ease 1.65s both}
      .c4{animation:scaleIn .25s ease 1.7s both} .c5{animation:scaleIn .25s ease 1.75s both}
      .c6{animation:scaleIn .25s ease 1.8s both} .c7{animation:scaleIn .25s ease 1.85s both}
    </style>
  </defs>

